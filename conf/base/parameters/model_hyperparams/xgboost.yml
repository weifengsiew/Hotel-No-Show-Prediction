model_hyperparams:
  xgboost:
    estimator:
      type: XGBClassifier
      params:
        random_state: 42
        eval_metric: logloss
        tree_method: hist
        n_jobs: 1

    search_grid:
      # Boosting stages (effective default: 100): more trees increase additive complexity, reducing underfitting (bias) but increasing overfitting (variance).
      model__n_estimators: [100, 300]
      # Shrinkage (effective default: 0.3): smaller updates reduce overfitting (variance), but need enough trees to avoid underfitting (bias).
      model__learning_rate: [0.05, 0.1, 0.2, 0.3]
      # Tree complexity (effective default: 6): deeper trees reduce underfitting (bias) by modelling interactions, but increase overfitting (variance).
      model__max_depth: [3, 6]
      # Leaf regularisation (effective default: 1): larger child-weight constraints reduce overfitting (variance) but increase underfitting (bias).
      model__min_child_weight: [1, 5]
