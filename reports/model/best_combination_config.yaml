data:
  cleaned_path: data/intermediate/noshow_cleaned.csv
  target_column: no_show
  drop_columns:
  - booking_id
  - price
processing:
  categorical_imputation: most_frequent
  numeric_imputation: median
  categorical_encoding: ordinal
model:
  name: random_forest
  parameters:
    random_state: 42
    n_jobs: -1
    max_depth: 20
    max_features: sqrt
    min_samples_leaf: 1
    n_estimators: 500
tracking:
  experiment_name: Hotel_No_Show_random_forest_features2
  run_name: random_forest_features2
  tracking_uri: sqlite:///mlflow.db
