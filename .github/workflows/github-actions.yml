name: Publish Kedro-Viz and run pipeline

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/github-actions.yml"
      - "conf/**"
      - "scripts/**"
      - "src/**"
      - "pyproject.toml"
      - "requirements.txt"
      - "run.sh"
  workflow_dispatch:

jobs:
  deploy:
    name: Publish Kedro-Viz and run pipeline
    runs-on: ubuntu-latest
    env:
      KEDRO: kedro
      KEDRO_DISABLE_TELEMETRY: "1"
      MPLCONFIGDIR: /tmp/kedro-mplconfig
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Fetch repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Deploy Kedro-Viz to GitHub Pages
        uses: kedro-org/publish-kedro-viz@v3
        with:
          project_path: "."
          telemetry_consent: false
          deployment_check: false

      - name: Run project workflow
        run: ./run.sh
